<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      /* Brand */
      --fk-primary: #F2A93B;
      --fk-primary-dark: #EF8644;
      --fk-primary-disabled: #F9DAB7;
      --fk-green: #2D5E49;

      /* System & Backgrounds */
      --fk-background: #FFFFFF;
      --fk-black: #190303;
      --fk-destructive: #B20900;

      /* Grey Scale (warm/peach-tinted) */
      --fk-grey1: #A68B59;
      --fk-grey2: #D0AD6C;
      --fk-grey3: #F2CE8C;
      --fk-grey4: #FFE8BD;
      --fk-grey5: #FFF1D6;
      --fk-grey6: #FFF6E5;

      /* Labels */
      --fk-label: #630E03;
      --fk-label-secondary: #B09E79;
      --fk-label-tertiary: rgba(124, 94, 38, 0.6);
      --fk-label-quaternary: rgba(124, 94, 38, 0.3);
      --fk-label-disabled: #C7B0AD;

      --font-bricolage: "Bricolage Grotesque", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--fk-background);
      color: var(--fk-label);
      font-family: var(--font-bricolage);
      overflow-x: hidden;
      overflow-y: auto;
      min-height: 100vh;
      min-height: 100dvh;
      width: 100vw;
    }

    /* Container */
    .app-container {
      max-width: 560px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem 1.5rem;
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* Typography Classes */
    .narrative-text {
      font-family: var(--font-bricolage);
      font-size: 17px;
      font-weight: 400;
      font-variation-settings: "wdth" 100;
      line-height: 1.5;
      color: var(--fk-label);
      text-align: center;
      margin-bottom: 2rem;
    }

    .question-title {
      font-family: var(--font-bricolage);
      font-size: 20px;
      font-weight: 600;
      font-variation-settings: "wdth" 100;
      line-height: 1.3;
      color: var(--fk-label);
      text-align: center;
      margin-top: 1.5rem;
      margin-bottom: 1rem;
    }

    .bodyCondensed {
      font-family: var(--font-bricolage);
      font-size: 18px;
      font-weight: 400;
      font-variation-settings: "wdth" 75;
      line-height: 1.4;
    }

    .caption1Condensed {
      font-family: var(--font-bricolage);
      font-size: 14px;
      font-weight: 400;
      font-variation-settings: "wdth" 75;
      line-height: 1.4;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Scene Illustration Box */
    .scene-box {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--fk-grey6);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--fk-grey5);
    }

    .composed-emoji {
      position: absolute;
      font-size: 4rem;
      user-select: none;
    }

    /* Button Stack */
    .action-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin-top: auto;
      /* Prop down if container is taller */
    }

    .fk-btn-stack {
      width: 100%;
      max-width: 480px;
      background: var(--fk-grey6);
      color: var(--fk-label);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 14px 20px;
      font-family: var(--font-bricolage);
      font-size: 18px;
      font-weight: 400;
      font-variation-settings: "wdth" 75;
      cursor: pointer;
      transition: all 0.2s ease-out;
      text-align: center;
      line-height: 1.3;
      min-width: 240px;
    }

    .fk-btn-stack:hover {
      border-color: var(--fk-primary);
      background: #FFFFFF;
    }

    .fk-btn-stack:active,
    .fk-btn-stack.selected {
      background: var(--fk-primary);
      border-color: var(--fk-primary);
      transform: scale(0.97);
    }

    .fk-btn-continue {
      font-weight: 600;
      min-width: 160px;
      width: fit-content;
      background: var(--fk-black);
      color: white;
      border: none;
    }

    .fk-btn-continue:hover {
      background: var(--fk-label-secondary);
      border: none;
    }

    .fk-btn-continue:active {
      transform: scale(0.97);
    }

    /* Screen Transitions */
    .screen {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    .screen.active {
      display: flex;
      animation: fadeUp 0.4s ease forwards;
    }

    @keyframes fadeUp {
      0% {
        transform: translateY(20px);
        opacity: 0;
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* Progress Indicator */
    #progress-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: transparent;
      z-index: 100;
    }

    #progress-bar {
      height: 100%;
      background: var(--fk-primary);
      width: 0%;
      transition: width 0.3s ease;
    }

      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);

      max-width: 520px;
      margin: 0 auto 2rem auto;
      border: 1px solid var(--fk-grey5);

      text-align: center;

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      border-right: 1px solid var(--fk-grey5);
    }

    .card-avatar-img {
      width: 110px;
      height: 110px;
      object-fit: contain;
    }

    .card-stats-cell {
      flex: 1;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat-list {
      list-style-type: none;
      margin-bottom: 1rem;
    }

    .stat-list:last-child {
      margin-bottom: 0;
    }

    .stat-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
      color: var(--fk-label);
    }

    .stat-item {
      font-size: 14px;
      color: var(--fk-label-secondary);
      margin-bottom: 2px;
      position: relative;
      padding-left: 12px;
    }

    .stat-item::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--fk-label-tertiary);
    }

    .card-subtitle {
      font-size: 14px;
      color: rgba(242, 169, 59, 0.7);
      /* fk-primary at 70% */
      margin-top: 4px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .card-catchphrase {
      background: var(--fk-grey5);
      padding: 1.25rem;
      text-align: center;
      font-style: italic;
      color: var(--fk-label);
      border-bottom: 1px solid var(--fk-grey4);
      font-size: 15px;
    }

    .card-section {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--fk-grey5);
      background: var(--fk-background);
    }

    .card-section-title {
      font-weight: 600;
      font-size: 15px;
      color: var(--fk-label);
      margin-bottom: 8px;
    }

    .card-text {
      font-size: 14px;
      color: var(--fk-label-secondary);
      line-height: 1.4;
    }

    .features-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .fk-chip {
      background: var(--fk-primary);
      color: var(--fk-label);
      border-radius: 16px;
      padding: 6px 14px;
      font-family: var(--font-bricolage);
      font-size: 14px;
      font-weight: 600;
      font-variation-settings: "wdth" 75;
      display: inline-block;
    }

    .card-reviews {
      background: rgba(26, 26, 20, 0.9);
      /* fk-label 90% */
      padding: 1.5rem;
    }

    .review-item {
      color: #FFFFFF;
      font-size: 14px;
      font-style: italic;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .review-item:last-child {
      margin-bottom: 0;
    }

    .review-author {
      color: var(--fk-primary);
      font-weight: 600;
      font-style: normal;
    }

    /* Result Actions */
    .result-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    .fk-btn-appstore {
      background: var(--fk-label);
      color: white;
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-family: var(--font-bricolage);
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .fk-btn-tertiary {
      background: transparent;
      color: var(--fk-primary-dark);
      border: none;
      font-family: var(--font-bricolage);
      font-size: 16px;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
    }
  </style>
</head>

    // --- Execution Logic ---

    function init() {
      // Create fixed DOM structure inside AppRoot
      const root = document.getElementById('app-root');

      SCREENS.forEach((screenData, idx) => {
        const wrap = document.createElement('div');
        wrap.id = `screen-${idx}`;
        wrap.className = 'screen';

        if (screenData.type === 'story') {
          wrap.innerHTML = buildStoryScreen(screenData, idx);
        } else if (screenData.type === 'choice') {
          wrap.innerHTML = buildChoiceScreen(screenData, idx);
        } else if (screenData.type === 'result') {
          // Empty container, hydrated dynamically at the end
          wrap.innerHTML = `<div id="result-wrapper"></div>`;
        }

        root.appendChild(wrap);
      });

      showScreen(0);
    }

    function buildStoryScreen(data, idx) {
      return `
        <div class="narrative-text">${data.text}</div>
        <div class="scene-box">${data.scene}</div>
        <div class="action-area">
          <button class="fk-btn-stack fk-btn-continue" onclick="advance(${idx})">${data.btn}</button>
        </div>
      `;
    }

    function buildChoiceScreen(data, idx) {
      let btnsHTML = '';
      data.answers.forEach((ans, i) => {
        btnsHTML += `<button class="fk-btn-stack fk-btn-choice id-btn-${idx}" style="animation-delay: ${0.05 * i}s;" onclick="selectAnswer(${idx}, ${data.qIdx}, ${ans.val}, this)">${ans.text}</button>`;
      });

      return `
        <div class="narrative-text" style="display:none;"></div>
        <div class="scene-box">${data.scene}</div>
        <div class="question-title">${data.text}</div>
        <div class="action-area">${btnsHTML}</div>
      `;
    }

    function showScreen(idx) {
      // Hide all 
      const allScreens = document.querySelectorAll('.screen');
      allScreens.forEach(s => s.classList.remove('active'));

      const target = document.getElementById(`screen-${idx}`);
      if (!target) return;

      // Force reflow
      void target.offsetWidth;
      target.classList.add('active');

      currentScreenIndex = idx;

      if (SCREENS[idx].type === 'result') {
        const winnerId = calculateWinner();
        renderResultCard(winnerId);
        document.getElementById('progress-container').style.display = 'none';
      } else {
        updateProgress();
      }
    }

    function advance(fromIdx) {
      if (fromIdx < SCREENS.length - 1) {
        showScreen(fromIdx + 1);
      }
    }

    function selectAnswer(screenIdx, qIdx, value, btnEl) {
      // Disable others visually
      const parent = btnEl.parentElement;
      const allBtns = parent.querySelectorAll(`.id-btn-${screenIdx}`);
      allBtns.forEach(b => {
        b.style.pointerEvents = 'none';
        b.style.opacity = '0.7';
      });
      btnEl.classList.add('selected');
      btnEl.style.opacity = '1';

      // Save Score
      userScores[qIdx] = value;

      setTimeout(() => advance(screenIdx), 380);
    }

    function calculateWinner() {
      // Sanity fallback in case they slipped through without 6 answers
      const safeScores = userScores.map(v => v === null ? 4 : v);

      let bestMatch = PERSONA_SCORES[0].id;
      let lowestDiff = 9999;

      for (const p of PERSONA_SCORES) {
        let diffSum = 0;
        for (let i = 0; i < 6; i++) {
          diffSum += Math.abs(safeScores[i] - p.scores[i]);
        }
        if (diffSum < lowestDiff) {
          lowestDiff = diffSum;
          bestMatch = p.id;
        }
      }

      return bestMatch;
    }

    function updateProgress() {
      // Count how many choices have passed or are active
      let choicesEncountered = 0;
      for (let i = 0; i <= currentScreenIndex; i++) {
        if (SCREENS[i].type === 'choice') {
          choicesEncountered++;
        }
      }

      const pc = (choicesEncountered / 6) * 100;
      document.getElementById('progress-bar').style.width = `${Math.min(pc, 100)}%`;
    }

    function renderResultCard(avatarId) {
      const data = RESULTS[avatarId] || RESULTS['avatar_01']; // fallback

      let strengthsHTML = '';
      data.strengths.forEach(s => strengthsHTML += `<li class="stat-item">${s}</li>`);

      let weaknessesHTML = '';
      data.weaknesses.forEach(w => weaknessesHTML += `<li class="stat-item">${w}</li>`);

      let featuresHTML = '';
      data.features.forEach(f => featuresHTML += `<span class="fk-chip" style="margin-right: 4px; margin-bottom: 4px;">${f}</span>`);

      let compatHTML = '';
      if (data.compatibility) {
        data.compatibility.forEach(c => compatHTML += `<span class="fk-chip" style="background:var(--fk-primary); color:white; margin-right:4px;">${c}</span>`);
      }

      let reviewsHTML = '';
      if (data.peers) {
        data.peers.forEach(r => reviewsHTML += `<div class="review-item">"${r.quote}" — <span class="review-author">${r.from}</span></div>`);
      }

      // Update our fallback AppStore URL property dynamically for the CTA
      const finalUrl = `forkcast://onboarding?foodsona=${avatarId}`;

      const cardHTML = `
        <div id="id-card">
          <div class="card-header">
            <div class="card-header-caption caption1Condensed" style="margin-bottom: 0.5rem; text-transform: uppercase;">Drumroll… your Forkcast ID is ready!</div>
            <div class="caption1Condensed" style="letter-spacing:0.15em; color: var(--fk-primary);">FORKCAST ID</div>
            <div class="card-title" style="margin-bottom: 2px;">${data.name}</div>
            <div class="card-subtitle">${data.subtitle}</div>
          </div>
          
          <div class="card-row-split" style="padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--fk-grey5);">
            <div class="card-avatar-cell" style="flex: 0 0 110px;">
              <img src="assets/${data.avatar}.png" alt="${data.name}" class="card-avatar-img" onerror="this.src=''; this.alt='❓'" />
            </div>
            <div class="card-stats-cell" style="flex: 1; padding-left: 1rem;">
              <ul class="stat-list">
                <li class="stat-title">⚡ Strengths:</li>
                ${strengthsHTML}
              </ul>
              <ul class="stat-list" style="margin-top: 1rem;">
                <li class="stat-title">⚠️ Weaknesses:</li>
                ${weaknessesHTML}
              </ul>
            </div>
          </div>

          <div class="card-catchphrase">
            "${data.catchphrase}"
          </div>

          <div class="card-section">
            <div class="stat-item" style="color:var(--fk-label); margin-bottom: 8px;">
              <strong>🧭 Alignment:</strong> ${data.alignment}
            </div>
            <div class="stat-item" style="color:var(--fk-label);">
              <strong>🎯 Hidden Talent:</strong> ${data.hiddenTalent}
            </div>
          </div>

          <div class="card-section">
            <div class="card-section-title">💚 Most compatible with:</div>
            <div class="features-wrapper">
              ${compatHTML}
            </div>
          </div>

          <div class="card-section">
            <div class="card-section-title" style="color:var(--fk-label-tertiary);">🍽️ Forkcast built this for you:</div>
            <div class="features-wrapper">
              ${featuresHTML}
            </div>
          </div>

          <div class="card-reviews">
            <div class="caption1Condensed" style="margin-bottom:12px; color:var(--fk-primary);">⭐ Peer Reviews:</div>
            ${reviewsHTML}
          </div>
        </div>

        <div class="result-actions">
          <button class="fk-btn-appstore" onclick="openAppStore('${finalUrl}')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM11.4 16.7L8.9 14.2C8.5 13.8 8.5 13.2 8.9 12.8C9.3 12.4 9.9 12.4 10.3 12.8L11.4 13.9L14.7 9.5C15.1 9 15.7 8.9 16.2 9.2C16.7 9.6 16.8 10.2 16.5 10.7L12.5 16.2C12.3 16.5 12.1 16.6 11.8 16.7C11.6 16.7 11.5 16.7 11.4 16.7Z" fill="white"/>
            </svg>
            Download on the App Store
          </button>
          <button class="fk-btn-tertiary" onclick="shareQuiz(this)" style="background: var(--fk-grey6); margin-top: -4px;">
            🔗 Share Quiz
          </button>
          <button class="fk-btn-tertiary" onclick="retakeQuiz()">↺ Try again</button>
        </div>
      `;

      document.getElementById('result-wrapper').innerHTML = cardHTML;
    }

    function retakeQuiz() {
      userScores = [null, null, null, null, null, null];
      document.getElementById('progress-container').style.display = 'block';
      showScreen(0);
    }

    function openAppStore(schemeUrl) {
      const appStoreUrl = "https://apps.apple.com/app/idYOUR_APP_ID"; // Replace with real ID

      const start = Date.now();
      window.location.href = schemeUrl;
      setTimeout(() => {
        if (Date.now() - start < 1500) {
          window.location.href = appStoreUrl;
        }
      }, 1000);
    }

    function shareQuiz(btnElement) {
      const url = window.location.href.split('?')[0]; // get clean URL

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(() => {
          const originalText = btnElement.innerHTML;
          btnElement.innerHTML = "✅ Copied!";
          setTimeout(() => {
            btnElement.innerHTML = originalText;
          }, 2000);
        }).catch(err => {
          console.error('Failed to copy: ', err);
          fallbackShare(url);
        });
      } else {
        fallbackShare(url);
      }
    }

    function fallbackShare(url) {
      const textArea = document.createElement("textarea");
      textArea.value = url;
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try {
        document.execCommand('copy');
        alert("Link copied to clipboard!");
      } catch (err) {
        console.error('Fallback copy failed', err);
      }
      document.body.removeChild(textArea);
    }

    // Init App
    window.addEventListener('DOMContentLoaded', init);

  </script>
</body>

</html>
